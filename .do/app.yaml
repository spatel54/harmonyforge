spec:
  name: harmonyforge
  region: nyc

  # ── Backend: Express API (port 8000) ─────────────────────────────────────────
  services:
    - name: backend
      github:
        repo: salt-family/harmonyforge
        branch: main
        deploy_on_push: true
      dockerfile_path: backend/Dockerfile
      source_dir: /
      http_port: 8000
      instance_count: 1
      instance_size_slug: basic-xxs   # $5/mo — upgrade if processing becomes slow

      health_check:
        http_path: /health
        initial_delay_seconds: 10
        period_seconds: 30
        timeout_seconds: 10
        failure_threshold: 3

      envs:
        - key: NODE_ENV
          value: production
          scope: RUN_AND_BUILD_TIME
        # CORS_ORIGIN is set to the app's primary URL after first deploy.
        # On initial deploy DO injects ${APP_URL}. Override manually if using a
        # custom domain: https://your-domain.com
        - key: CORS_ORIGIN
          value: ${APP_URL}
          scope: RUN_AND_BUILD_TIME

    # ── Frontend: Next.js (port 3000) ──────────────────────────────────────────
    - name: frontend
      github:
        repo: salt-family/harmonyforge
        branch: main
        deploy_on_push: true
      dockerfile_path: frontend/Dockerfile
      source_dir: /
      http_port: 3000
      instance_count: 1
      instance_size_slug: basic-s     # $12/mo — Next.js SSR needs more memory than xxs

      health_check:
        http_path: /
        initial_delay_seconds: 40
        period_seconds: 30
        timeout_seconds: 15
        failure_threshold: 3

      envs:
        - key: NODE_ENV
          value: production
          scope: RUN_AND_BUILD_TIME

        # Backend URL — DO resolves ${backend.PUBLIC_URL} at build time so
        # NEXT_PUBLIC_API_URL is correctly baked into the client bundle.
        - key: NEXT_PUBLIC_API_URL
          value: ${backend.PUBLIC_URL}
          scope: BUILD_TIME

        # OpenAI API key — set this via the DO dashboard (Encryption: secret).
        # DO NOT put the real key in this file; leave blank here and set via UI.
        - key: OPENAI_API_KEY
          value: ""
          scope: RUN_AND_BUILD_TIME
          type: SECRET

        - key: OPENAI_MODEL
          value: gpt-4o-mini
          scope: RUN_AND_BUILD_TIME
