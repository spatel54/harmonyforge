version: "3.9"

# Local parity with a self-hosted single-image deploy.
#
# Usage:
#   cp .env.example .env.local
#   docker compose up --build
#
# Browser → http://localhost:3000 (Next.js + engine + pdfalto + oemer all in one).

services:
  harmonyforge:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
        OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5-nano}"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5-nano}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      HF_SOLVER_MAX_MS: "${HF_SOLVER_MAX_MS:-}"
      HF_SOLVER_MAX_NODES: "${HF_SOLVER_MAX_NODES:-}"
      HF_MAX_CHORD_SLOTS: "${HF_MAX_CHORD_SLOTS:-}"
      OEMER_CHECKPOINT_DIR: /var/oemer
    volumes:
      - oemer-checkpoints:/var/oemer
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >
          require('http').get('http://localhost:3000/api/health',
          (r) => process.exit(r.statusCode < 500 ? 0 : 1))
          .on('error', () => process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  oemer-checkpoints: {}

networks:
  default:
    name: harmonyforge-net
