name: Deploy — Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

# Require these repository secrets:
#   AZURE_CLIENT_ID        — Service Principal App ID (federated OIDC)
#   AZURE_TENANT_ID        — Azure Active Directory Tenant ID
#   AZURE_SUBSCRIPTION_ID  — Target subscription
#   AZURE_ACR_NAME         — ACR registry name, e.g. harmonyforgeacr
#   OPENAI_API_KEY         — Theory Inspector LLM key
#
# Repository variables (Settings → Variables → Actions):
#   AZURE_RESOURCE_GROUP   — e.g. harmonyforge-rg
#   AZURE_LOCATION         — e.g. eastus
#   AZURE_BACKEND_URL      — Stable backend Container App ingress URL
#                            (set this after first backend deploy, then re-run)

permissions:
  id-token: write   # Required for OIDC federated credential login
  contents: read

# NOTE: Secret-derived env vars are set per-job to ensure they resolve correctly.
# Top-level env only contains non-secret values.
env:
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'harmonyforge-rg' }}
  LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}

jobs:
  # ── CI Gates ──────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (engine)
        run: npm run build:engine

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (production source)
        run: |
          output=$(npx tsc --noEmit 2>&1 || true)
          non_test_errors=$(echo "$output" | grep -v '\.test\.' | grep 'error TS' || true)
          if [ -n "$non_test_errors" ]; then
            echo "$non_test_errors"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Build (validate NEXT_PUBLIC_API_URL baking)
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          OPENAI_API_KEY: sk-stub-ci-key-not-real
        run: npm run build

  # ── Azure Login (shared across deploy jobs) ───────────────────────────────────
  azure-login:
    name: Azure OIDC Login
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    outputs:
      backend_url: ${{ steps.get-backend-url.outputs.backend_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Resource Group exists
        run: |
          az group create \
            --name "$RESOURCE_GROUP" \
            --location "$LOCATION" \
            --output none

      - name: Ensure Container Apps Environment exists
        run: |
          if ! az containerapp env show \
                --name harmonyforge-env \
                --resource-group "$RESOURCE_GROUP" \
                --output none 2>/dev/null; then
            az containerapp env create \
              --name harmonyforge-env \
              --resource-group "$RESOURCE_GROUP" \
              --location "$LOCATION" \
              --output none
          fi

      - name: Retrieve stable backend URL (if already deployed)
        id: get-backend-url
        run: |
          url=$(az containerapp show \
            --name harmonyforge-backend \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv 2>/dev/null || echo "")
          if [ -n "$url" ]; then
            echo "backend_url=https://$url" >> "$GITHUB_OUTPUT"
          else
            # First deploy: use the variable if set, otherwise a placeholder
            echo "backend_url=${{ vars.AZURE_BACKEND_URL || 'http://localhost:8000' }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Build & Push: Backend ─────────────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: azure-login
    env:
      ACR_REGISTRY: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
      BACKEND_IMAGE: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/harmonyforge-backend

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.AZURE_ACR_NAME }}"

      - name: Build & push backend image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t "$BACKEND_IMAGE:${{ github.sha }}" \
            -t "$BACKEND_IMAGE:latest" \
            backend/
          docker push "$BACKEND_IMAGE:${{ github.sha }}"
          docker push "$BACKEND_IMAGE:latest"


  # ── Build & Push: Frontend ────────────────────────────────────────────────────
  # NOTE: build-frontend intentionally runs AFTER deploy-backend so the confirmed
  # backend FQDN is baked into NEXT_PUBLIC_API_URL at Next.js build time.
  build-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    env:
      ACR_REGISTRY: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
      FRONTEND_IMAGE: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/harmonyforge-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.AZURE_ACR_NAME }}"

      - name: Build & push frontend image
        env:
          BACKEND_URL: https://${{ needs.deploy-backend.outputs.backend_fqdn }}
        run: |
          echo "→ Baking NEXT_PUBLIC_API_URL=$BACKEND_URL into frontend bundle"
          docker build \
            -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL="$BACKEND_URL" \
            --build-arg OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --build-arg OPENAI_BASE_URL="${{ secrets.OPENAI_BASE_URL }}" \
            --build-arg OPENAI_MODEL="gpt-4o-mini" \
            -t "$FRONTEND_IMAGE:${{ github.sha }}" \
            -t "$FRONTEND_IMAGE:latest" \
            frontend/
          docker push "$FRONTEND_IMAGE:${{ github.sha }}"
          docker push "$FRONTEND_IMAGE:latest"

  # ── Deploy: Backend ───────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [backend-ci, build-backend]
    outputs:
      backend_fqdn: ${{ steps.deploy.outputs.backend_fqdn }}
    env:
      ACR_REGISTRY: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
      BACKEND_IMAGE: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/harmonyforge-backend

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for Container Apps Environment to be ready
        run: |
          echo "→ Waiting for harmonyforge-env to reach Succeeded state..."
          for i in $(seq 1 20); do
            STATE=$(az containerapp env show \
              --name harmonyforge-env \
              --resource-group "$RESOURCE_GROUP" \
              --query "properties.provisioningState" \
              --output tsv 2>/dev/null || echo "Unknown")
            echo "  Attempt $i/20: state=$STATE"
            if [ "$STATE" = "Succeeded" ]; then
              echo "✅ Environment ready."
              break
            fi
            sleep 15
          done

      - name: Enable ACR admin & get credentials
        id: acr-creds
        run: |
          az acr update --name "${{ secrets.AZURE_ACR_NAME }}" --admin-enabled true --output none
          ACR_USER=$(az acr credential show --name "${{ secrets.AZURE_ACR_NAME }}" --query username --output tsv)
          ACR_PASS=$(az acr credential show --name "${{ secrets.AZURE_ACR_NAME }}" --query 'passwords[0].value' --output tsv)
          echo "acr_user=$ACR_USER" >> "$GITHUB_OUTPUT"
          echo "acr_pass=$ACR_PASS" >> "$GITHUB_OUTPUT"

      - name: Wait for backend app to be ready (if exists)
        run: |
          echo "→ Checking harmonyforge-backend state..."
          for i in $(seq 1 10); do
            STATE=$(az containerapp show \
              --name harmonyforge-backend \
              --resource-group "$RESOURCE_GROUP" \
              --query "properties.provisioningState" \
              --output tsv 2>/dev/null || echo "NotFound")
            echo "  Attempt $i/10: state=$STATE"
            if [ "$STATE" != "InProgress" ]; then
              echo "✅ App ready for update (or doesn't exist yet)."
              break
            fi
            sleep 15
          done

      - name: Deploy backend Container App
        id: deploy
        run: |
          ACR_USER="${{ steps.acr-creds.outputs.acr_user }}"
          ACR_PASS="${{ steps.acr-creds.outputs.acr_pass }}"

          az containerapp create \
            --name harmonyforge-backend \
            --resource-group "$RESOURCE_GROUP" \
            --environment harmonyforge-env \
            --image "$BACKEND_IMAGE:${{ github.sha }}" \
            --registry-server "$ACR_REGISTRY" \
            --registry-username "$ACR_USER" \
            --registry-password "$ACR_PASS" \
            --target-port 8000 \
            --ingress external \
            --min-replicas 1 \
            --max-replicas 3 \
            --cpu 0.5 \
            --memory 1.0Gi \
            --env-vars "NODE_ENV=production" \
            --output none \
            2>/dev/null || \
          az containerapp update \
            --name harmonyforge-backend \
            --resource-group "$RESOURCE_GROUP" \
            --image "$BACKEND_IMAGE:${{ github.sha }}" \
            --output none

          fqdn=$(az containerapp show \
            --name harmonyforge-backend \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          echo "backend_fqdn=$fqdn" >> "$GITHUB_OUTPUT"
          echo "✅ Backend deployed at: https://$fqdn"


  # ── Deploy: Frontend ──────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Azure Container Apps
    runs-on: ubuntu-latest
    needs: [frontend-ci, build-frontend]
    env:
      ACR_REGISTRY: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
      FRONTEND_IMAGE: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/harmonyforge-frontend

    steps:
      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR credentials
        id: acr-creds-fe
        run: |
          ACR_USER=$(az acr credential show --name "${{ secrets.AZURE_ACR_NAME }}" --query username --output tsv)
          ACR_PASS=$(az acr credential show --name "${{ secrets.AZURE_ACR_NAME }}" --query 'passwords[0].value' --output tsv)
          echo "acr_user=$ACR_USER" >> "$GITHUB_OUTPUT"
          echo "acr_pass=$ACR_PASS" >> "$GITHUB_OUTPUT"

      - name: Wait for frontend app to be ready (if exists)
        run: |
          echo "→ Checking harmonyforge-frontend state..."
          for i in $(seq 1 10); do
            STATE=$(az containerapp show \
              --name harmonyforge-frontend \
              --resource-group "$RESOURCE_GROUP" \
              --query "properties.provisioningState" \
              --output tsv 2>/dev/null || echo "NotFound")
            echo "  Attempt $i/10: state=$STATE"
            if [ "$STATE" != "InProgress" ]; then
              echo "✅ App ready for update (or doesn't exist yet)."
              break
            fi
            sleep 15
          done

      - name: Deploy frontend Container App
        run: |
          BACKEND_FQDN="${{ needs.deploy-backend.outputs.backend_fqdn }}"
          ACR_USER="${{ steps.acr-creds-fe.outputs.acr_user }}"
          ACR_PASS="${{ steps.acr-creds-fe.outputs.acr_pass }}"

          az containerapp create \
            --name harmonyforge-frontend \
            --resource-group "$RESOURCE_GROUP" \
            --environment harmonyforge-env \
            --image "$FRONTEND_IMAGE:${{ github.sha }}" \
            --registry-server "$ACR_REGISTRY" \
            --registry-username "$ACR_USER" \
            --registry-password "$ACR_PASS" \
            --target-port 3000 \
            --ingress external \
            --min-replicas 1 \
            --max-replicas 5 \
            --cpu 0.5 \
            --memory 1.0Gi \
            --env-vars \
              "NODE_ENV=production" \
              "OPENAI_MODEL=gpt-4o-mini" \
              "OPENAI_API_KEY=secretref:openai-api-key" \
              "OPENAI_BASE_URL=secretref:openai-base-url" \
            --secrets \
              "openai-api-key=${{ secrets.OPENAI_API_KEY }}" \
              "openai-base-url=${{ secrets.OPENAI_BASE_URL }}" \
            --output none \
            2>/dev/null || \
          az containerapp update \
            --name harmonyforge-frontend \
            --resource-group "$RESOURCE_GROUP" \
            --image "$FRONTEND_IMAGE:${{ github.sha }}" \
            --set-env-vars "NODE_ENV=production" "OPENAI_MODEL=gpt-4o-mini" "OPENAI_API_KEY=secretref:openai-api-key" "OPENAI_BASE_URL=secretref:openai-base-url" \
            --set-secrets "openai-api-key=${{ secrets.OPENAI_API_KEY }}" "openai-base-url=${{ secrets.OPENAI_BASE_URL }}" \
            --output none

          fqdn=$(az containerapp show \
            --name harmonyforge-frontend \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          echo "✅ Frontend deployed at: https://$fqdn"


  # ── Smoke Test ────────────────────────────────────────────────────────────────
  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]

    steps:
      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify frontend root (public HTTPS)
        run: |
          FRONTEND_FQDN=$(az containerapp show \
            --name harmonyforge-frontend \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "Testing https://$FRONTEND_FQDN ..."
          status=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --retry 5 --retry-delay 5 --retry-connrefused \
            "https://$FRONTEND_FQDN")
          if [ "$status" -ge 500 ]; then
            echo "❌ Frontend returned HTTP $status"
            exit 1
          fi
          echo "✅ HarmonyForge live at https://$FRONTEND_FQDN (HTTP $status)"
          echo "ℹ️  Backend is internal-only (harmonyforge-backend.internal.*) — reachable only within the Container Apps environment."
