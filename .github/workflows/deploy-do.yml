name: CI — HarmonyForge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: type-check + lint + unit tests ─────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (engine)
        run: npm run build:engine

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ── Frontend: type-check + lint + build ─────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # tsc --noEmit covers production source. Test files have 3 pre-existing type
      # errors (missing Measure.id in test fixtures); tsconfig has no exclude for
      # *.test.ts. Filter them here so CI fails only on non-test errors.
      - name: Type-check (production source)
        run: |
          output=$(npx tsc --noEmit 2>&1 || true)
          non_test_errors=$(echo "$output" | grep -v '\.test\.' | grep 'error TS' || true)
          if [ -n "$non_test_errors" ]; then
            echo "$non_test_errors"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Build (validates NEXT_PUBLIC_API_URL baking)
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          # Stub key so LangChain doesn't throw at import-time
          OPENAI_API_KEY: sk-stub-ci-key-not-real
        run: npm run build

  # ── Docker build smoke test (PRs only, no push) ─────────────────────────────
  docker-smoke:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t harmonyforge-backend:smoke \
            .

      - name: Build frontend image
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:8000 \
            --build-arg OPENAI_API_KEY=sk-stub-ci-key-not-real \
            -t harmonyforge-frontend:smoke \
            frontend/

      - name: Health check — backend container
        run: |
          docker run -d --name hf-backend -p 8000:8000 harmonyforge-backend:smoke
          sleep 5
          curl --fail --retry 5 --retry-delay 2 http://localhost:8000/health
          docker rm -f hf-backend

  # ── Deploy: DigitalOcean App Platform auto-deploys on push to main ───────────
  # DO App Platform watches the main branch directly via the GitHub integration
  # configured in .do/app.yaml. No manual deploy step is needed here.
  #
  # To trigger a manual re-deploy:
  #   doctl apps create-deployment <APP_ID>
  #
  # Monitor deploy status:
  #   doctl apps list-deployments <APP_ID>
